<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  <!-- 3D Building / CAD icon -->
  <!-- Base -->
  <polygon points="128,200 40,155 40,95 128,140" fill="#ffffff" opacity="0.25"/>
  <polygon points="128,200 216,155 216,95 128,140" fill="#ffffff" opacity="0.4"/>
  <polygon points="40,95 128,50 216,95 128,140" fill="#ffffff" opacity="0.55"/>
  <!-- Inner structure lines -->
  <line x1="128" y1="50" x2="128" y2="140" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="84" y1="72" x2="84" y2="162" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="172" y1="72" x2="172" y2="162" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <!-- Top face accent lines -->
  <line x1="84" y1="72" x2="128" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="172" y1="72" x2="128" y2="50" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="84" y1="72" x2="40" y2="95" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="172" y1="72" x2="216" y2="95" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <!-- Edge highlights -->
  <line x1="40" y1="95" x2="40" y2="155" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>
  <line x1="216" y1="95" x2="216" y2="155" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>
  <line x1="128" y1="140" x2="128" y2="200" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>
  <line x1="40" y1="95" x2="128" y2="140" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="216" y1="95" x2="128" y2="140" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="40" y1="155" x2="128" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="216" y1="155" x2="128" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="40" y1="95" x2="128" y2="50" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="216" y1="95" x2="128" y2="50" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
