---
name: Feature Request
description: Suggest a feature for OpenCAD
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the Feature
      placeholder: A clear description of the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      placeholder: Describe the problem this feature would solve.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Other solutions you've considered.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: Any other information, mockups, or references.
