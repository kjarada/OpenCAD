---
name: Bug Report
description: Report a bug in OpenCAD
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      placeholder: "e.g. 1.87.0"
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: OpenCAD Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      placeholder: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: Any other information, screenshots, or sample IFC files.
